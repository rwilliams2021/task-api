services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: task_api
      POSTGRES_USER: task_api
      POSTGRES_PASSWORD: task_api
    ports:
      - "5432:5432"
    volumes:
      - task_api_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  task-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_api
      DB_USERNAME: task_api
      DB_PASSWORD: task_api
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  task_api_pgdata:
